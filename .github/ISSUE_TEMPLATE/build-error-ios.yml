name: "🛠️ Build error (iOS)"
description: "Your app fails to build / compile / link on iOS when using react-native-vision-camera."
title: "🛠️ (iOS) "
labels: ["🛠️ build-error", "platform:ios"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before opening this issue

        Most build errors are caused by environment or setup issues, not by VisionCamera itself. Please check these first:

        - ✅ [Troubleshooting guide](https://react-native-vision-camera.com/docs/guides/troubleshooting)
        - ✅ [Installation guide](https://react-native-vision-camera.com/docs/guides)
        - ✅ Clean build: delete `node_modules`, `ios/Pods`, `ios/build`, and Xcode's DerivedData, then reinstall.
        - ✅ Search [existing issues](https://github.com/mrousavy/react-native-vision-camera/issues?q=is%3Aissue+label%3A%22%F0%9F%9B%A0%EF%B8%8F+build-error%22) — build errors are very often duplicates.
        - ❌ Do **not** paste AI-generated summaries of the error. Paste the actual error text.

  - type: textarea
    id: error
    attributes:
      label: Full build error output
      description: |
        The complete error as printed by `xcodebuild` / `pod install` — not just the last line.

        **Paste as text**, not as a screenshot. Use a code block.
      render: shell
    validations:
      required: true

  - type: input
    id: version-exact
    attributes:
      label: VisionCamera version
      description: |
        Exact version from `package.json` (e.g. `5.2.1`).
        See [Releases](https://github.com/mrousavy/react-native-vision-camera/releases) for the full list.
      placeholder: "5.2.1"
    validations:
      required: true

  - type: input
    id: rn-version
    attributes:
      label: React Native version
      placeholder: "0.85.2"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: React Native architecture
      options:
        - New Architecture (Fabric / bridgeless)
        - Old Architecture (Paper)
    validations:
      required: true

  - type: dropdown
    id: expo
    attributes:
      label: Expo?
      options:
        - Bare React Native (no Expo)
        - Expo (managed, EAS Build)
        - Expo (bare workflow with config plugins)
    validations:
      required: true

  - type: input
    id: host-os
    attributes:
      label: Host macOS version
      description: From `sw_vers`. Include chip (Apple Silicon / Intel).
      placeholder: "macOS 14.5 (Sonoma) on Apple Silicon (M2)"
    validations:
      required: true

  - type: input
    id: xcode-version
    attributes:
      label: Xcode version
      description: From `xcodebuild -version`.
      placeholder: "Xcode 15.4 (15F31d)"
    validations:
      required: true

  - type: input
    id: ios-deployment-target
    attributes:
      label: iOS Deployment Target
      description: From your `Podfile` / target settings.
      placeholder: "15.1"
    validations:
      required: true

  - type: input
    id: cocoapods-version
    attributes:
      label: CocoaPods version
      description: From `pod --version`.
      placeholder: "1.15.2"
    validations:
      required: true

  - type: input
    id: ruby-version
    attributes:
      label: Ruby version
      description: From `ruby --version` (matters for CocoaPods).
      placeholder: "3.2.2"
    validations:
      required: true

  - type: dropdown
    id: target
    attributes:
      label: Build target
      multiple: true
      options:
        - Physical device
        - Simulator (Apple Silicon)
        - Simulator (Intel / Rosetta)
    validations:
      required: true

  - type: dropdown
    id: package-manager
    attributes:
      label: Package manager
      options:
        - npm
        - yarn (classic)
        - yarn (berry / pnp)
        - pnpm
        - bun
    validations:
      required: true

  - type: checkboxes
    id: tried
    attributes:
      label: Steps you have already tried
      description: Check the ones you've tried. This helps us skip obvious suggestions.
      options:
        - label: Deleted `node_modules` and reinstalled.
        - label: Deleted `ios/Pods` and `ios/Podfile.lock`, then ran `pod install` again.
        - label: Deleted Xcode's DerivedData (`~/Library/Developer/Xcode/DerivedData`).
        - label: Searched existing GitHub issues for the error message.
        - label: Tried on a fresh `npx @react-native-community/cli init` project with only VisionCamera installed.

  - type: textarea
    id: repro
    attributes:
      label: Reproduction repository (strongly encouraged)
      description: |
        If the error reproduces on a fresh project, a link to a minimal public repo dramatically speeds up diagnosis.

        Not strictly required for build errors (unlike runtime bugs), but the lack of one may mean the issue sits unresolved.
      placeholder: "https://github.com/<you>/vision-camera-build-repro"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant info — other native libraries, custom Podfile changes, monorepo setup, EAS Build config, use_frameworks!, static/dynamic linking, etc.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this build error.
          required: true
        - label: I did a clean install (deleted `node_modules`, `Pods`, DerivedData) before reporting.
          required: true
        - label: I pasted the full error output as text, not as a screenshot.
          required: true

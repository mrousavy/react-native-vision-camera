name: "🛠️ Build error (Android)"
description: "Your app fails to build / compile / link on Android when using react-native-vision-camera."
title: "🛠️ (Android) "
labels: ["🛠️ build-error", "platform:android"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before opening this issue

        Most build errors are caused by environment or setup issues, not by VisionCamera itself.

        **A public reproduction repository is required.** Build errors depend on your toolchain, native dependencies, Gradle config, and dozens of other factors — we cannot debug something we cannot reproduce. Reports without a repro will be **closed without investigation**.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm you've done each of these. Every box must be ticked.
      options:
        - label: I have read and followed every applicable step in the [Nitro Modules Troubleshooting guide](https://nitro.margelo.com/docs/guides/troubleshooting).
          required: true
        - label: I have read the [VisionCamera Troubleshooting guide](https://react-native-vision-camera.com/docs/guides/troubleshooting) and [Installation guide](https://react-native-vision-camera.com/docs/guides).
          required: true
        - label: I did a clean build — deleted `node_modules`, `android/build`, `android/.gradle`, `android/app/build`, and `~/.gradle/caches`, then reinstalled.
          required: true
        - label: I searched [existing build-error issues](https://github.com/mrousavy/react-native-vision-camera/issues?q=is%3Aissue+label%3A%22%F0%9F%9B%A0%EF%B8%8F+build-error%22) and found nothing matching.
          required: true

  - type: textarea
    id: error
    attributes:
      label: Full build error output
      description: |
        The complete error as printed by Gradle — not just the last line. Run with `--stacktrace` if the failure is inside a task and include it.

        **Paste as text**, not as a screenshot. Use a code block.
      render: shell
    validations:
      required: true

  - type: input
    id: version-exact
    attributes:
      label: VisionCamera version
      description: |
        Exact version from `package.json` (e.g. `5.2.1`).
        See [Releases](https://github.com/mrousavy/react-native-vision-camera/releases) for the full list.
      placeholder: "5.2.1"
    validations:
      required: true

  - type: input
    id: rn-version
    attributes:
      label: React Native version
      placeholder: "0.85.2"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: React Native architecture
      options:
        - New Architecture (Fabric / bridgeless)
        - Old Architecture (Paper)
    validations:
      required: true

  - type: dropdown
    id: expo
    attributes:
      label: Expo?
      options:
        - Bare React Native (no Expo)
        - Expo (managed, EAS Build)
        - Expo (bare workflow with config plugins)
    validations:
      required: true

  - type: input
    id: host-os
    attributes:
      label: Host OS + version
      description: What OS are you building on? Include architecture if relevant.
      placeholder: "macOS 14.5 (Apple Silicon) / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: android-studio-version
    attributes:
      label: Android Studio version
      description: From Android Studio → About. Even if you build from the CLI, please fill this out.
      placeholder: "Android Studio Koala 2024.1.1"
    validations:
      required: true

  - type: input
    id: gradle-version
    attributes:
      label: Gradle version
      description: From `android/gradle/wrapper/gradle-wrapper.properties`.
      placeholder: "8.7"
    validations:
      required: true

  - type: input
    id: agp-version
    attributes:
      label: Android Gradle Plugin (AGP) version
      description: From `android/build.gradle`.
      placeholder: "8.3.2"
    validations:
      required: true

  - type: input
    id: kotlin-version
    attributes:
      label: Kotlin version
      description: From `android/build.gradle` `kotlinVersion`.
      placeholder: "1.9.24"
    validations:
      required: true

  - type: input
    id: jdk-version
    attributes:
      label: JDK version
      description: From `java --version`.
      placeholder: "OpenJDK 17.0.10"
    validations:
      required: true

  - type: input
    id: ndk-version
    attributes:
      label: NDK version
      description: From `android/build.gradle` `ndkVersion`. Leave blank if not set.
      placeholder: "26.1.10909125"

  - type: input
    id: android-min-sdk
    attributes:
      label: Android minSdkVersion
      placeholder: "24"
    validations:
      required: true

  - type: input
    id: android-compile-sdk
    attributes:
      label: Android compileSdkVersion
      placeholder: "34"
    validations:
      required: true

  - type: input
    id: android-target-sdk
    attributes:
      label: Android targetSdkVersion
      placeholder: "34"
    validations:
      required: true

  - type: dropdown
    id: target
    attributes:
      label: Build target
      multiple: true
      options:
        - Physical device
        - Emulator
    validations:
      required: true

  - type: dropdown
    id: package-manager
    attributes:
      label: Package manager
      options:
        - npm
        - yarn (classic)
        - yarn (berry / pnp)
        - pnpm
        - bun
    validations:
      required: true

  - type: input
    id: repro
    attributes:
      label: Reproduction repository
      description: |
        **Required.** A link to a minimal public GitHub repository that reproduces the build error on a fresh clone.

        Start from a fresh `npx @react-native-community/cli init` and add only what's needed to trigger the error.

        Issues without a reproduction repo are **invalid** and will be closed. Stripped-down snippets in the description do not count.
      placeholder: "https://github.com/<you>/vision-camera-build-repro"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant info — other native libraries, custom Gradle/Kotlin changes, monorepo setup, EAS Build config, R8/ProGuard rules, Hermes vs JSC, etc.

  - type: checkboxes
    id: submission
    attributes:
      label: Submission
      description: Please confirm each of the following about what you submitted above. Every box must be ticked.
      options:
        - label: I pasted the full error output as text (not a screenshot).
          required: true
        - label: I wrote this report in my own words. I did not paste AI-generated summaries of the error.
          required: true
        - label: The reproduction repository I linked is public and reproduces the build error on a fresh clone. I understand the issue will be closed without one.
          required: true

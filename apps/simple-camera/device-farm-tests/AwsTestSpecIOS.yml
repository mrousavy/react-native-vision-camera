version: 0.1

ios_test_host: macos_sequoia

phases:
  install:
    commands:
      - devicefarm-cli use node 20
      - node -v
      - xcodebuild -version
      - curl -fsSL https://bun.com/install | bash
      - xcrun devicectl list devices
      - ~/.bun/bin/bun install --frozen-lockfile

  test:
    commands:
      - HARNESS_ARTIFACTS="$WORKING_DIRECTORY/harness-artifacts"
      - HARNESS_JUNIT="$HARNESS_ARTIFACTS/harness-results.junit.xml"
      - HARNESS_LOG="$HARNESS_ARTIFACTS/harness-output.log"
      - HARNESS_SIGNING_ENV="$HARNESS_ARTIFACTS/harness-ios-signing.env"
      - HARNESS_METRO_HOST_FILE="$HARNESS_ARTIFACTS/metro-host-ip.txt"
      - mkdir -p "$HARNESS_ARTIFACTS"

      # Resolve host IPv6 for Metro. On macOS runners IPv4 won't work, as
      # confirmed by AWS support. AWS recommends utun interfaces for this.
      - |
        set -euo pipefail

        METRO_HOST_IP="$(ifconfig utun1 2>/dev/null | awk '/inet6 / {ip=$2} END {print ip}' || true)"
        if [ -z "$METRO_HOST_IP" ]; then
          METRO_HOST_IP="$(ifconfig utun0 2>/dev/null | awk '/inet6 / {ip=$2} END {print ip}' || true)"
        fi

        METRO_HOST_IP="${METRO_HOST_IP%%%*}"
        if [ -z "$METRO_HOST_IP" ]; then
          echo "Failed to resolve Metro host IPv6." >&2
          exit 1
        fi

        echo "Using Metro host IPv6 for iOS harness: ${METRO_HOST_IP}"
        echo "$METRO_HOST_IP" > "$HARNESS_METRO_HOST_FILE"

      # Inspect whether Device Farm exposes signing material we can reuse for
      # the XCTest runner that Harness builds dynamically.
      - |
        set -euo pipefail

        : > "$HARNESS_SIGNING_ENV"

        echo "Available code signing identities:"
        SIGNING_IDENTITIES="$WORKING_DIRECTORY/codesigning-identities.txt"
        security find-identity -v -p codesigning > "$SIGNING_IDENTITIES" || true
        cat "$SIGNING_IDENTITIES"

        SIGNING_IDENTITY_LINE="$(
          awk '
            /"Apple Development:/ || /"iPhone Developer:/ {
              print
              exit
            }
          ' "$SIGNING_IDENTITIES"
        )"
        SIGNING_IDENTITY_HASH="$(printf '%s\n' "$SIGNING_IDENTITY_LINE" | awk '{print $2}')"
        SIGNING_IDENTITY="$(
          printf '%s\n' "$SIGNING_IDENTITY_LINE" |
            sed -n 's/.*"\(.*\)".*/\1/p'
        )"

        echo "Device Farm app path: ${DEVICEFARM_APP_PATH:-<unset>}"

        APP_PROFILE=""
        if [ -n "${DEVICEFARM_APP_PATH:-}" ] && [ -d "$DEVICEFARM_APP_PATH" ]; then
          APP_PROFILE="$DEVICEFARM_APP_PATH/embedded.mobileprovision"
        elif [ -n "${DEVICEFARM_APP_PATH:-}" ] && [ -f "$DEVICEFARM_APP_PATH" ]; then
          APP_UNZIP_DIR="$(mktemp -d)"
          unzip -q "$DEVICEFARM_APP_PATH" -d "$APP_UNZIP_DIR" || true
          APP_PROFILE="$(find "$APP_UNZIP_DIR/Payload" -path "*.app/embedded.mobileprovision" -print -quit 2>/dev/null || true)"
        fi

        TEAM_ID=""
        if [ -n "$SIGNING_IDENTITY" ]; then
          TEAM_ID="$(printf '%s\n' "$SIGNING_IDENTITY" | sed -n 's/.*(\([A-Z0-9][A-Z0-9]*\)).*/\1/p')"
          if [ -n "$TEAM_ID" ]; then
            echo "Using signing identity from keychain: ${SIGNING_IDENTITY} (${SIGNING_IDENTITY_HASH:-unknown hash})"
          else
            echo "Could not parse team ID from signing identity: ${SIGNING_IDENTITY}"
          fi
        fi

        if [ -n "$APP_PROFILE" ] && [ -f "$APP_PROFILE" ]; then
          APP_PROFILE_PLIST="$(mktemp)"
          if security cms -D -i "$APP_PROFILE" > "$APP_PROFILE_PLIST" 2>/dev/null; then
            APP_PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$APP_PROFILE_PLIST" 2>/dev/null || true)"
            APP_PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" "$APP_PROFILE_PLIST" 2>/dev/null || true)"
            APP_PROFILE_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$APP_PROFILE_PLIST" 2>/dev/null || true)"
            echo "Device Farm app profile: ${APP_PROFILE_NAME:-unknown} team=${APP_PROFILE_TEAM_ID:-unknown} app=${APP_PROFILE_ID:-unknown}"
            if [ -z "$TEAM_ID" ]; then
              TEAM_ID="$APP_PROFILE_TEAM_ID"
            fi
          fi
          rm -f "$APP_PROFILE_PLIST"
        fi

        PROFILES_LIST="$HARNESS_ARTIFACTS/provisioning-profiles.txt"
        find \
          "$HOME/Library/MobileDevice/Provisioning Profiles" \
          "/Library/MobileDevice/Provisioning Profiles" \
          -name "*.mobileprovision" \
          -print 2>/dev/null | sort > "$PROFILES_LIST" || true

        PROFILE_COUNT="$(wc -l < "$PROFILES_LIST" | tr -d ' ')"
        echo "Found ${PROFILE_COUNT} provisioning profile(s)."

        while IFS= read -r PROFILE_PATH; do
          [ -n "$PROFILE_PATH" ] || continue

          PROFILE_PLIST="$(mktemp)"
          if ! security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST" 2>/dev/null; then
            rm -f "$PROFILE_PLIST"
            continue
          fi

          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST" 2>/dev/null || true)"
          PROFILE_DISPLAY_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST" 2>/dev/null || true)"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST" 2>/dev/null || true)"

          echo "Provisioning profile: ${PROFILE_DISPLAY_NAME:-unknown} team=${PROFILE_TEAM_ID:-unknown} app=${PROFILE_APP_ID:-unknown}"

          if [ -z "$TEAM_ID" ] && [ -n "$PROFILE_TEAM_ID" ]; then
            TEAM_ID="$PROFILE_TEAM_ID"
          fi

          rm -f "$PROFILE_PLIST"
        done < "$PROFILES_LIST"

        if [ -n "$TEAM_ID" ]; then
          echo "Using iOS signing team for Harness XCTest agent: ${TEAM_ID}"
          {
            printf "HARNESS_IOS_DEVELOPMENT_TEAM=%q\n" "$TEAM_ID"
          } >> "$HARNESS_SIGNING_ENV"
        else
          echo "No iOS development team found for Harness XCTest agent signing."
        fi

      # Actually run the JS Harness tests. Harness owns the XCTest agent
      # lifecycle and builds it without signing when no codeSign config exists.
      - |
        set -euo pipefail

        : "${DEVICEFARM_DEVICE_UDID:?Missing DEVICEFARM_DEVICE_UDID. Device Farm must provide the physical iOS device UDID.}"

        set -a
        . "$HARNESS_SIGNING_ENV"
        set +a

        cd apps/simple-camera

        set +e
        HARNESS_METRO_BIND_HOST="::" \
          HARNESS_IOS_METRO_HOST="$(cat "$HARNESS_METRO_HOST_FILE")" \
          HARNESS_IOS_DEVICE_ID="$DEVICEFARM_DEVICE_UDID" \
          HARNESS_DETECT_NATIVE_CRASHES=false \
          CI=true \
          JEST_JUNIT_OUTPUT_FILE="$HARNESS_JUNIT" \
          ~/.bun/bin/bun run test:harness -- \
            --harnessRunner ios \
            --reporters=default \
            --reporters=jest-junit 2>&1 | tee "$HARNESS_LOG"
        HARNESS_EXIT="${PIPESTATUS[0]}"
        set -e

        if [ -d ".harness" ]; then
          rm -rf "$HARNESS_ARTIFACTS/harness-directory"
          cp -R ".harness" "$HARNESS_ARTIFACTS/harness-directory"
        fi

        exit "$HARNESS_EXIT"

artifacts:
  - $WORKING_DIRECTORY/harness-artifacts

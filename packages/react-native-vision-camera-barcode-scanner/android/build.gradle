buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:9.1.0"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: 'org.jetbrains.kotlin.android'
apply from: '../nitrogen/generated/android/VisionCameraBarcodeScanner+autolinking.gradle'
apply from: "./fix-prefab.gradle"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["VisionCameraBarcodeScanner_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["VisionCameraBarcodeScanner_" + name]).toInteger()
}

def isWindowsOs() {
  return System.properties["os.name"].toLowerCase().contains("windows")
}

// Windows: CMake/Ninja default next to this module (often deep under node_modules), exceeding
// path limits. Relocate under root android/build (standard Gradle output, already gitignored).
if (isWindowsOs()) {
  def safeName = project.name.replace(":", "_")
  project.buildDir = new File(rootProject.buildDir, "externalNativeModules/${safeName}")
}

android {
  namespace "com.margelo.nitro.camera.barcodescanner"

  ndkVersion getExtOrDefault("ndkVersion")
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -Wextra -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        abiFilters (*reactNativeArchitectures())

        buildTypes {
          debug {
            cppFlags "-O1 -g"
          }
          release {
            cppFlags "-O2"
          }
        }
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
      if (isWindowsOs()) {
        buildStagingDirectory = new File(project.buildDir, "cxx")
      }
    }
  }

  packagingOptions {
    excludes = [
            "META-INF",
            "META-INF/**",
            "**/libc++_shared.so",
            "**/libNitroModules.so",
            "**/libfbjni.so",
            "**/libjsi.so",
            "**/libfolly_json.so",
            "**/libfolly_runtime.so",
            "**/libglog.so",
            "**/libhermes.so",
            "**/libhermes-executor-debug.so",
            "**/libhermes_executor.so",
            "**/libreactnative.so",
            "**/libreactnativejni.so",
            "**/libturbomodulejsijni.so",
            "**/libreact_nativemodule_core.so",
            "**/libjscexecutor.so"
    ]
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      if (isNewArchitectureEnabled()) {
        java.srcDirs += [
          // React Codegen files
          "${project.buildDir}/generated/source/codegen/java"
        ]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
}


dependencies {
  // For < 0.71, this will be from the local maven repo
  // For > 0.71, this will be replaced by `com.facebook.react:react-android:$version` by react gradle plugin
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"

  // Add minimal dependency on CameraX to use ImageAnalysis
  def camerax_version = "1.7.0-alpha01"
  implementation "androidx.camera:camera-core:${camerax_version}"

  // Google MLKit library
  implementation 'com.google.mlkit:barcode-scanning:17.3.0'

  // Add a dependency on NitroModules
  implementation project(":react-native-nitro-modules")

  // Add a dependency on VisionCamera (for HybridFrameSpec and HybridCameraOutputSpec)
  implementation project(":react-native-vision-camera")
}

// Gradle 9 validates task dependencies: JS bundle tasks read New Architecture codegen
// outputs from libraries. Wire bundle tasks to this module's codegen when present.
gradle.projectsEvaluated {
  def codegenTask = tasks.findByName("generateCodegenArtifactsFromSchema")
  if (codegenTask != null) {
    rootProject.subprojects.each { sub ->
      if (sub.plugins.hasPlugin("com.android.application")) {
        sub.tasks.matching { t ->
          t.name.startsWith("createBundle") && t.name.endsWith("JsAndAssets")
        }.configureEach { t ->
          t.dependsOn(codegenTask)
        }
      }
    }
  }
}
